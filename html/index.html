<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @font-face {
            font-family: 'Pricedown';
            src: url('https://fonts.cdnfonts.com/s/14875/pricedown bl.woff') format('woff');
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }

        .gta-title {
            font-family: 'Pricedown', sans-serif;
            -webkit-text-stroke: 1.5px black;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.9));
        }

        .gta-stats {
            font-family: 'Arial Narrow', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .center-bar {
            background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 25%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
<body class="bg-transparent h-screen w-screen">

    <div id="success-container" class="hidden h-full w-full flex items-center justify-center">
        <div id="animate-box" class="w-full py-10 center-bar text-center">
            
            <h1 id="title" class="gta-title text-8xl text-yellow-400 mb-2 animate__animated uppercase">
                STUNT COMPLETED
            </h1>

            <div class="h-[2px] w-1/3 mx-auto bg-white/80 shadow-[0_0_10px_rgba(255,255,255,0.3)] mb-6"></div>

            <div class="gta-stats flex justify-center gap-16 text-white italic">
                
                <div class="flex flex-col items-center">
                    <div class="flex items-center gap-1 text-gray-300 mb-1">
                        <i class='bx bx-stopwatch text-lg'></i>
                        <span id="label-time" class="text-xs font-bold uppercase">Time</span>
                    </div>
                    <span class="text-4xl font-black italic">
                        <span id="time-val">0.00</span><span class="text-xl ml-1">s</span>
                    </span>
                </div>
                
                <div class="flex flex-col items-center border-l border-white/10 pl-16">
                    <div class="flex items-center gap-1 text-gray-300 mb-1">
                        <i class='bx bx-trending-up text-lg'></i>
                        <span id="label-height" class="text-xs font-bold uppercase">Height</span>
                    </div>
                    <span class="text-4xl font-black italic">
                        <span id="height-val">0.00</span><span class="text-xl ml-1">m</span>
                    </span>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
